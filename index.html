<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic CMS Demo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <nav class="navbar">

        <h2 id="clinicName"></h2>

        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#doctors">Doctors</a></li>
            <li><a href="#gallery">Gallery</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

    </nav>

</header>


<section class="hero">

    <img id="heroImage" alt="Hero Image">

    <h1 id="tagline"></h1>

</section>


<section id="about">

    <h2 id="aboutTitle"></h2>

    <p id="aboutDescription"></p>

</section>


<section id="services">

    <h2>Our Services</h2>

    <div id="servicesContainer"></div>

</section>


<section id="doctors">

    <h2>Doctors</h2>

    <div id="doctorContainer"></div>

</section>


<section id="gallery">

    <h2>Gallery</h2>

    <div id="galleryContainer"></div>

</section>


<section id="video">

    <h2>Clinic Tour</h2>

    <video id="clinicVideo" controls width="700"></video>

</section>


<section id="testimonials">

    <h2>Testimonials</h2>

    <div id="testimonialContainer"></div>

</section>


<section id="contact">

    <h2>Contact</h2>

    <p id="phone"></p>

    <p id="email"></p>

    <p id="address"></p>

</section>


<script src="script.js"></script>

</body>
</html>
