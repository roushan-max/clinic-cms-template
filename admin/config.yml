backend:
  name: github
  repo: roushan-max/clinic-cms-template
  branch: main
  base_url: https://netlify-cms-github-oauth-provider-9qjw.onrender.com
  auth_endpoint: auth

media_folder: "images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Clinic Website"
    files:
      - file: "content/site.json"
        label: "Website Content"
        name: "site"
        fields:
          - label: "Clinic Name"
            name: "clinicName"
            widget: "string"

          - label: "Tagline"
            name: "tagline"
            widget: "string"

          - label: "Phone"
            name: "phone"
            widget: "string"

          - label: "Email"
            name: "email"
            widget: "string"

          - label: "WhatsApp"
            name: "whatsapp"
            widget: "string"

          - label: "Address"
            name: "address"
            widget: "text"

          - label: "Hero Image"
            name: "heroImage"
            widget: "image"

          - label: "About Title"
            name: "aboutTitle"
            widget: "string"

          - label: "About Description"
            name: "aboutDescription"
            widget: "text"

          - label: "Video"
            name: "video"
            widget: "string"
